name: iOS - Build and Submit

on:
  push:
    branches: ["main"]

jobs:
  build_ios:
    name: Build iOS App
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit to App Store
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
    env:
      EXPO_DEBUG: "1"
