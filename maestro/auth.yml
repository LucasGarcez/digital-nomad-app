appId: com.coffstack.digitalnomadapp
---
- launchApp

- tapOn:
    id: "email-input"
- inputText: "contato@coffstack.com"

- tapOn:
    id: "password-input"
- inputText: "a123456b"

- hideKeyboard

- tapOn:
    text: "Entrar"

- assertVisible: ".*signed in.*"

# Sign out
- tapOn:
    text: .*Perfil.*

- repeat:
    while:
      notVisible: ".*Bem-vindo.*"
    commands:
      - tapOn:
          id: "sign-out-button"

- assertVisible: ".*Bem-vindo.*"
