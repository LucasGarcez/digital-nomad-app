appId: com.coffstack.digitalnomadapp
---
- launchApp

- runFlow: sign-in.yml

# Sign In Out
- tapOn:
    text: ".*Perfil.*"
- tapOn:
    text: ".*Sair.*"

- repeat:
    while:
      notVisible: ".*Bem-vindo.*"
    commands:
      - tapOn:
          id: "sign-out-button"
# Sign Out Success
- assertVisible: ".*Bem-vindo.*"

- stopApp: com.coffstack.digitalnomadapp
