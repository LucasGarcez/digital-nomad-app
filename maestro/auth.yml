appId: com.coffstack.digitalnomadapp
---
- launchApp:
    clearState: true

- runFlow: sign-in.yml

# Sign out
- tapOn:
    text: .*Perfil.*

- repeat:
    while:
      notVisible: ".*Bem-vindo.*"
    commands:
      - runFlow:
          when:
            visible: "sign-out-button"
          commands:
            - tapOn:
                id: "sign-out-button"
      - runFlow:
          when:
            notVisible: "sign-out-button"
          commands:
            - tapOn:
                text: "Sair"

- assertVisible: ".*Bem-vindo.*"
